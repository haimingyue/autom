spring:
  datasource:
    url: jdbc:h2:mem:atoms;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  security:
    session-ttl-days: 30
    session-renew-before-hours: 72
  wechat:
    app-id: test-app-id
    app-secret: test-app-secret
    code2session-url: http://127.0.0.1/mock-wechat/code2session
