spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/${DB_NAME:atoms}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:AtomsMysql8!2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

app:
  security:
    session-ttl-days: ${APP_SESSION_TTL_DAYS:30}
